# ========================
# NVIDIA (ESSENCIAL)
# ========================
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

env = GTK_THEME,Adwaita:dark

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NVD_BACKEND,direct

# ========================
# MONITOR
# ========================
monitor=HDMI-A-1,1920x1080,-1920x0,1
monitor=eDP-1,1920x1080,0x0,1

# ========================
# INPUT
# ========================
input {
    kb_layout = br
    kb_variant = abnt2
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        tap-to-click = yes
        disable_while_typing = true

    }

    sensitivity = 0
}

# ========================
# VISUAL
# ========================
general {
    border_size = 3
    col.active_border = rgba(00ffffff)
    col.inactive_border = rgba(444444ff)

    gaps_in = 5
    gaps_out = 10

    layout = dwindle
}

decoration {
    rounding = 8
}

# ========================
# KEYBINDS
# ========================
$mainMod = SUPER1
$terminal = kitty
$menu = hyprlauncher

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive
bind = $mainMod, M, fullscreen

# foco
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# mover janela
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# arrastar janela (SUPER + botão esquerdo)
bindm = $mainMod, mouse:272, movewindow

# redimensionar janela (SUPER + botão direito)
bindm = $mainMod, mouse:273, resizewindow

#floating enable
bind = $mainMod, F, togglefloating

# launcher
bind = $mainMod, SPACE, exec, wofi --show drun --allow-images

# waybar
bind = $mainMod, 0, exec, pkill waybar || waybar

# dolphin exec
bind = $mainMod, E, exec, thunar

#new binds test
bind = $mainMod, R, exec, hyprctl reload & notify-send "hyprland reload"
bind = $mainMod, S, exec, grim -g "$(slurp)" - | wl-copy
# move to workspca
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
# move windows to workspca
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7

# brilho notebook
bind = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness_internal.sh up
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness_internal.sh down

#bind volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
#mute
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

#play/pause
bind = , XF86AudioPlay, exec, playerctl play-pause
#next
bind = , XF86AudioNext, exec, playerctl next
#previous
bind = , XF86AudioPrev, exec, playerctl previous
#screens
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, P, exec, ~/.config/hypr/scripts/power-menu.sh

#clipboard history
bind = $mainMod, V, exec, cliphist list | uniq | wofi --dmenu | cliphist decode | wl-copy
#screenshot
bind = , Print, exec, grim -g "$(slurp)" - | satty --filename -
#screen suspend
bindl = , switch:on:Lid Switch, exec, bash -c "hyprlock & sleep 0.2 && systemctl suspend"   
# ========================
# STARTUP
# ========================
exec-once = waybar
exec-once = blueman-applet
exec-once = nm-applet
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = mako
exec-once = waypaper
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle

